name: Tag release

# Se dispara en cada push a main.
# Si la versión en pubspec.yaml no tiene tag todavía, lo crea automáticamente.
on:
  push:
    branches: [main]

jobs:
  tag:
    name: Create version tag
    runs-on: ubuntu-latest

    permissions:
      contents: write   # necesario para crear tags

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # histórico completo para detectar tags existentes

      - name: Extraer versión de pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//' | tr -d '[:space:]')
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Versión detectada: v${VERSION}"

      - name: Comprobar si el tag ya existe
        id: check
        run: |
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "El tag ${{ steps.version.outputs.version }} ya existe — nada que hacer."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Crear y publicar tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.version }}" \
                  -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"
          echo "Tag ${{ steps.version.outputs.version }} publicado."
